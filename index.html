<!DOCTYPE html>
<html>
  <head>
    <title>My Interactive 3D Scan</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      
      <a-assets>
        <a-asset-item id="myScan" src="models/scan.glb"></a-asset-item>
      </a-assets>

      <a-entity gltf-model="#myScan" position="0 0 -3" scale="1 1 1"></a-entity>

      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" position="1 2 1" intensity="0.5"></a-light>

      <a-entity id="rig" position="0 0 0">
        <a-camera position="0 1.6 0"></a-camera>
        <a-entity laser-controls="hand: left"></a-entity>
        <a-entity laser-controls="hand: right"></a-entity>
      </a-entity>

      <a-sky color="#ECECEC"></a-sky>
      
    </a-scene>
  </body>
</html>
